name: Trading Bot Automation
on:
  schedule:
    - cron: '*/5 * * * *' # প্রতি ৫ মিনিট পর পর চেক করবে
  workflow_dispatch: # ম্যানুয়ালি রান করার জন্য
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests pandas numpy

      - name: Run Bot
        env:
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py
