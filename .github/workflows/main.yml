name: Trading Bot
on:
  schedule:
    - cron: '*/15 * * * *' # প্রতি ১৫ মিনিট পর পর চলবে
  workflow_dispatch: # ম্যানুয়ালি রান করার জন্য
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9' # স্টাবল ভার্সন ৩.৯ ব্যবহার করা হয়েছে
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas-ta requests
      - name: Run Bot
        env:
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py
