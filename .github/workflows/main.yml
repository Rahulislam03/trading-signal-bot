name: Trading Bot Automation
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests pandas numpy
          # pandas-ta ইনস্টলেশন এরর এড়াতে অন্যভাবে ট্রাই করছি
          pip install pandas_ta --no-dependencies || echo "Silent fail, manual handling in script"

      - name: Run Bot
        env:
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py
