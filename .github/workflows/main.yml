name: Trading Bot
on:
  schedule:
    - cron: '*/15 * * * *' # প্রতি ১৫ মিনিট পর পর চলবে
  workflow_dispatch:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install
        run: pip install yfinance pandas_ta requests
      - name: Run Bot
        env:
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py
